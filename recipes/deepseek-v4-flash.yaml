# Recipe: Deepseek-V4-Flash
# uses Marlin-DeepGEMM fallback on the last layer. This fixes a numerical error on Marlin
recipe_version: "1"
name: Deepseek-V4-Flash
description: vLLM serving Deepseek V4 Flash

# HuggingFace model to download (optional, for --download-model)
model: deepseek-ai/DeepSeek-V4-Flash

# Container image to use
container: lmxxf/vllm-deepseek-v4-dgx-spark

# Cluster only
cluster_only: true

# mods: 
#   - mods/nemotron-super

env:
  TRANSFORMERS_OFFLINE: 1
  VLLM_MXFP4_MARLIN_DEEPGEMM_LAYERS: 42

defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 2
  gpu_memory_utilization: 0.8
  max_model_len: 262144
  max_num_seqs: 10

command: |
  vllm serve deepseek-ai/DeepSeek-V4-Flash \
  --served-model-name deepseek-v4-flash \
  --kv-cache-dtype fp8 \
  --moe-backend marlin \
  --gpu-memory-utilization {gpu_memory_utilization} \
  --max-model-len {max_model_len} \
  --max-num-seqs {max_num_seqs} \
  --host {host} \
  --port {port} \
  --tool-call-parser deepseek_v4 \
  --tensor-parallel-size {tensor_parallel} \
  --distributed-executor-backend ray \
  --enforce-eager \
  --enable-auto-tool-choice \
  > /tmp/vllm-serve.log 2>&1